<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0A3D7A"/>
    </linearGradient>
    <linearGradient id="pipeV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9AA5B8"/>
      <stop offset="35%" stop-color="#E0E4EC"/>
      <stop offset="65%" stop-color="#E0E4EC"/>
      <stop offset="100%" stop-color="#9AA5B8"/>
    </linearGradient>
    <linearGradient id="pipeH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9AA5B8"/>
      <stop offset="35%" stop-color="#E0E4EC"/>
      <stop offset="65%" stop-color="#E0E4EC"/>
      <stop offset="100%" stop-color="#9AA5B8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B0FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shape">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Pipe: bold L-shape -->
    <rect x="195" y="80" width="90" height="210" rx="6" fill="url(#pipeV)"/>
    <rect x="195" y="220" width="230" height="90" rx="6" fill="url(#pipeH)"/>

    <!-- Water inside pipe -->
    <g filter="url(#glow)">
      <rect x="222" y="95" width="36" height="165" rx="4" fill="url(#water)"/>
      <rect x="222" y="240" width="36" height="36" rx="4" fill="url(#water)"/>
      <rect x="240" y="240" width="170" height="36" rx="4" fill="url(#water)"/>
    </g>

    <!-- Spin arrow -->
    <g filter="url(#glow)">
      <path d="M 138 168 A 168 168 0 0 1 380 380"
            fill="none" stroke="#00E5FF" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
      <polygon points="370,396 398,374 368,364" fill="#00E5FF" opacity="0.85"/>
    </g>
  </g>
</svg>
